# ERA5-CERRA 2 dataset in, 2 dataset out - 2 steps in, 1 step out
# trained with the same config from the anemoi-training multi-dataset integration test
# but with reduced resolution datasets of O48 ERA5 and 0.2° CERRA,
# the latter also with a reduced area to fit the interpolated lat/lon grid inside the lambert conformal projection

- name: grib-in-grib/netcdf-out
  input:
    era5: input-era5-o48.grib
    cerra: input-cerra-0p2.grib
  output:
    era5: output-era5.grib
    cerra: output-cerra.nc
  checks:
    - check_grib:
        file: ${era5.output:}
        check_accum: cp
        check_nans: true
        reference_date: 20170102T00
    - check_with_xarray:
        file: ${cerra.output:}
        check_accum: tp
        check_nans: true
  inference_config:
    checkpoint: ${checkpoint:}
    date: 20170102T00
    input:
      era5:
        grib: ${era5.input:}
      cerra:
        grib: ${cerra.input:}
    output:
      era5:
        grib: ${era5.output:}
      cerra:
        netcdf: ${cerra.output:}
    post_processors:
      - accumulate_from_start_of_forecast
    write_initial_state: false

- name: grib/dataset-in-netcdf-out
  input:
    era5: input-era5-o48.grib
    # cerra input is downloaded at runtime by anemoi-datasets (see below)
  output:
    era5: output-era5.nc
    cerra: output-cerra.nc
  checks:
    - check_with_xarray:
        file: ${era5.output:}
        check_nans: true
    - check_with_xarray:
        file: ${cerra.output:}
        check_nans: true
  inference_config:
    checkpoint: ${checkpoint:}
    date: 20170102T00
    input:
      era5:
        grib: ${era5.input:}
      cerra:
        dataset: ${s3:}/cerra-rr-an-oper-0001-mars-0p2-2017-2017-6h-v1-testing.zarr.zip
    output:
      era5:
        netcdf: ${era5.output:}
      cerra:
        netcdf: ${cerra.output:}
    write_initial_state: false
