- name: 3in-2out-grib
  input: input.grib
  output: output.grib
  checks:
    - check_grib:
        grib_keys:
          stream: oper
          type: fc
        check_nans: true
  inference_config:
    checkpoint: ${checkpoint:}
    input:
      grib: ${input:}
    output:
      grib: ${output:}
    write_initial_state: false

- name: 3in-2out-netcdf
  input: input.grib
  output: output.nc
  checks:
    - check_with_xarray:
        check_nans: true
        expected_time: 8
  inference_config:
    checkpoint: ${checkpoint:}
    lead_time: 6
    input:
      grib: ${input:}
    output:
      netcdf: ${output:}
    write_initial_state: false
